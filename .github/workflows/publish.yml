name: Publish to VS Code Marketplace

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'media/**'
      - 'package.json'
      - 'README.md'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run compile

      - name: Run tests
        run: npm test

      - name: Package VSIX
        run: npm run package

      - name: Publish to Marketplace
        run: npx @vscode/vsce publish --pat ${{ secrets.VSCE_PAT }}

